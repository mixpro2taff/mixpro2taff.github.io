<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PIXEL QUEST - v2.1.3</title>

    <style>
        :root {
            --bg-color: #08080c;
            --card-bg: #111116;
            --accent: #f1c40f;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }

        #start-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .stats-bar {
            display: flex; justify-content: space-around; width: 950px;
            border: 4px double #fff; padding: 15px; background: #000; margin-bottom: 20px;
        }

        .stat-item { text-align: center; flex: 1; }
        .stat-label { font-size: 0.7em; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: var(--accent); }

        #game-screen {
            width: 950px; height: 350px; background: #000;
            border: 2px solid #222; padding: 20px;
            overflow-y: auto; margin-bottom: 20px;
        }

        #merchant-area {
            display: none; width: 950px; background: #050505;
            border: 2px dashed var(--accent);
            padding: 20px; margin-bottom: 20px;
        }

        .btn {
            background: #000; color: #fff; border: 2px solid #fff;
            padding: 10px 20px; cursor: pointer;
            font-family: inherit; font-weight: bold;
        }

        .btn:hover { background: #fff; color: #000; }
    </style>
</head>

<body>

<!-- MENU -->
<div id="start-menu">
    <h1 style="color: var(--accent); font-size: 4em;">PIXEL QUEST</h1>
    <p>SÉLECTIONNE TA DIFFICULTÉ</p>

    <button class="btn" onclick="startGame('facile')">FACILE</button>
    <button class="btn" onclick="startGame('normal')">NORMAL</button>
    <button class="btn" onclick="startGame('difficile')">DIFFICILE</button>
</div>

<!-- STATS -->
<div class="stats-bar">
    <div class="stat-item"><div>Jour</div><div id="stat-jour">1</div></div>
    <div class="stat-item"><div>PV</div><div id="stat-pv">100</div></div>
    <div class="stat-item"><div>Or</div><div id="stat-or">40</div></div>
</div>

<!-- GAME -->
<div id="game-screen"></div>

<div id="merchant-area">
    <h2>Marchand</h2>
    <div id="merchant-cards"></div>
    <button class="btn" onclick="finishDay()">Continuer</button>
</div>

<button class="btn" onclick="playTurn()">Lancer Jour</button>

<!-- SCRIPTS -->
<script src="data.js"></script>
<script src="game.js"></script>
<script src="events.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>

</body>
</html>
